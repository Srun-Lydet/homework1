    <h1>HTML 03 - Links and Images</h1>

    <section class="card">
      <h2>Anchor link</h2>
      <p>Links use the <code>&lt;a&gt;</code> tag and <code>href</code> attribute.</p>
      <a class="button" href="https://developer.mozilla.org/en-US/docs/Web/HTML" target="_blank" rel="noopener">Open
        HTML Reference</a>
    </section>
    <section class="card">
      <h2>Image</h2>
      <p>Images use the <code>&lt;img&gt;</code> tag with <code>src</code> and <code>alt</code>.</p>
      <img src="../../../assets/images/logo.svg" alt="Web lesson logo"
        style="max-width: 320px; width: 100%; border-radius: 18px;">
    </section>

  </main>
