<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML 06 - Forms</title>
  <link rel="stylesheet" href="../../../assets/css/main.css">

</head>

<body>
  <main class="container lesson-layout">
    <a class="back-link" href="../../../index.html">← Back to All Lessons</a>
    <h1>HTML 06 - Forms</h1>

    <section class="card">
      <h2>Registration Form</h2>
      <form method="post">
        <label for="name">Full name</label>
        <input id="name" type="text" placeholder="Enter your name">

        <label for="email">Email</label>
        <input id="email" type="email" placeholder="example@gmail.com">

        <label for="gender">Gender</label>
        <select id="gender">
          <option value="">Choose gender</option>
          <option>Male</option>
          <option>Female</option>
        </select>

        <label>Skill</label>
        <label><input type="checkbox" style="width:auto;"> HTML</label>
        <label><input type="checkbox" style="width:auto;"> CSS</label>
        <label><input type="checkbox" style="width:auto;"> JavaScript</label>

        <label for="message">Message</label>
        <textarea id="message" rows="4" placeholder="Write something..."></textarea>

        <button class="button" type="button">Submit</button>

        <!-- <input type="radio" value="summit"> -->
      </form>
    </section>

  </main>
</body>

</html>
