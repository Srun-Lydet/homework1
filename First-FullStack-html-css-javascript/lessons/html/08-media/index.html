<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML 08 - Media Tags</title>
  <link rel="stylesheet" href="../../../assets/css/main.css">

</head>

<body>
  <main class="container lesson-layout">
    <a class="back-link" href="../../../index.html">← Back to All Lessons</a>
    <h1>HTML 08 - Media Tags</h1>

    <section class="card">
      <h2>Video Tag</h2>
      <p>This video uses a public sample source. You can replace it with your own local file.</p>
      <video controls width="100%" style="max-width:600px; border-radius:12px;">
        <source src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4" type="video/mp4">
        Your browser does not support video.
      </video>
    </section>

    <section class="card">
      <h2>Audio Tag</h2>
      <audio controls>
        <source src="https://interactive-examples.mdn.mozilla.net/media/cc0-audio/t-rex-roar.mp3" type="audio/mpeg">
        Your browser does not support audio.
      </audio>
    </section>

  </main>
</body>

</html>
