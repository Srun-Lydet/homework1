<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML 07 - Semantic Layout</title>
  <link rel="stylesheet" href="../../../assets/css/main.css">

</head>

<body>
  <main class="container lesson-layout">
    <a class="back-link" href="../../../index.html">← Back to All Lessons</a>
    <h1>HTML 07 - Semantic Layout</h1>

    <header class="card" style="margin-bottom:16px;">
      <h2>Website Header</h2>
      <nav>
        <a href="#home">Home</a> |
        <a href="#about">About</a> |
        <a href="#contact">Contact</a>
      </nav>
    </header>

    <main class="grid">
      <section class="card">
        <h2>About Course</h2>
        <p>This section explains the course information.</p>
      </section>

      <aside class="card">
        <h2>Sidebar</h2>
        <p>Use aside for related links or extra content.</p>
      </aside>

    </main>
    <footer class="card" style="margin-top:16px;">
      <p>Footer: copyright and contact information.</p>
    </footer>

  </main>
</body>

</html>
