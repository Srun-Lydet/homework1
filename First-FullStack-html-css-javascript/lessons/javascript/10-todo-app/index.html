    let todos = ['Learn HTML', 'Practice CSS', 'Build JS project'];

    function renderTodos() {
      const list = document.getElementById('todoList');

          <span>${todo}</span>
          <button onclick="deleteTodo(${index})">Delete</button>
        </li>
