<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JavaScript 15 - Fetch API</title>
  <link rel="stylesheet" href="../../../assets/css/main.css">

</head>

<body>
  <main class="container lesson-layout">
    <a class="back-link" href="../../../index.html">← Back to All Lessons</a>
    <h1>JavaScript 15 - Fetch API</h1>

    <section class="card">
      <h2>Fetch API Demo</h2>
      <p>This uses an online test API. Internet is required for this lesson.</p>
      <button class="button" onclick="loadUsers()">Load Users</button>
      <div id="users" class="demo-box">Click load users.</div>
    </section>

  </main>
  <script>
    async function loadUsers() {
      const usersBox = document.getElementById('users');
      usersBox.textContent = 'Loading...';

      try {
        const response = await fetch('https://jsonplaceholder.typicode.com/users');
        const users = await response.json();
        usersBox.innerHTML = users.slice(0, 5).map(user => `
      <p><strong>${user.name}</strong><br>${user.email}</p>
    `).join('');
      } catch (error) {
        usersBox.textContent = 'Cannot load data. Please check internet connection.';
      }
    }
  </script>
</body>

</html>
